{% extends "base.html" %}
{% block title %}Forgot Username{% endblock %}
{% block content %}
<div class="auth-screen">
  <div class="auth-card">
    <div class="auth-icon">🔍</div>
    <h2 class="auth-title">FIND USERNAME</h2>
    <p class="auth-sub">Enter your email to recover your username</p>

    {% if message is defined and message %}
    <div class="alert alert-success">💡 {{ message }}</div>
    {% endif %}

    <form method="post" action="/forgot-username" class="auth-form">
      <div class="field-group">
        <label class="field-label">EMAIL ADDRESS</label>
        <input type="email" name="email" class="field-input"
               placeholder="you@example.com" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">🔍 FIND USERNAME</button>
    </form>
    <div class="auth-links">
      <a href="/login" class="auth-link">← Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
