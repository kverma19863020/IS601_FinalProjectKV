{% extends "base.html" %}
{% block content %}
<h1>{% if calc %}Edit Calculation #{{ calc.id }}{% else %}New Calculation{% endif %}</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="{% if calc %}/calculations/{{ calc.id }}/edit{% else %}/calculations/new{% endif %}">
  <label>Operation
    <select name="operation" required>
      {% for op in ["add", "subtract", "multiply", "divide"] %}
        <option value="{{ op }}" {% if calc and calc.operation == op %}selected{% endif %}>{{ op }}</option>
      {% endfor %}
    </select>
  </label>
  <label>Operand 1
    <input type="number" step="any" name="operand1" value="{% if calc %}{{ calc.operand1 }}{% endif %}" required/>
  </label>
  <label>Operand 2
    <input type="number" step="any" name="operand2" value="{% if calc %}{{ calc.operand2 }}{% endif %}" required/>
  </label>
  <button type="submit">{% if calc %}Update{% else %}Calculate{% endif %}</button>
  <a href="/calculations">Cancel</a>
</form>
{% endblock %}
