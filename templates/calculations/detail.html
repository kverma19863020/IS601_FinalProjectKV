{% extends "base.html" %}
{% block content %}
<h1>Calculation #{{ calc.id }}</h1>
<dl>
  <dt>Operation</dt><dd>{{ calc.operation }}</dd>
  <dt>Operand 1</dt><dd>{{ calc.operand1 }}</dd>
  <dt>Operand 2</dt><dd>{{ calc.operand2 }}</dd>
  <dt>Result</dt><dd><strong>{{ calc.result }}</strong></dd>
  <dt>Created</dt><dd>{{ calc.created_at }}</dd>
</dl>
<a href="/calculations/{{ calc.id }}/edit" class="btn">Edit</a>
<a href="/calculations">← Back</a>
{% endblock %}
