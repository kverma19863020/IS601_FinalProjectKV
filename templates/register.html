{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-screen">
  <div class="auth-card">
    <div class="auth-icon">🧙</div>
    <h2 class="auth-title">CREATE PLAYER</h2>
    <p class="auth-sub">Start your calculation adventure</p>

    {% if error is defined and error %}
    <div class="alert alert-error">❌ {{ error }}</div>
    {% endif %}

    <form method="post" action="/register" class="auth-form">
      <div class="field-group">
        <label class="field-label">USERNAME</label>
        <input type="text" name="username" class="field-input" placeholder="choose_username" required/>
      </div>
      <div class="field-group">
        <label class="field-label">EMAIL</label>
        <input type="email" name="email" class="field-input" placeholder="you@example.com" required/>
      </div>
      <div class="field-group">
        <label class="field-label">PASSWORD</label>
        <input type="password" name="password" class="field-input"
               placeholder="min 6 characters" required minlength="6"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">⊕ CREATE ACCOUNT</button>
    </form>

    <div class="auth-links">
      <a href="/login" class="auth-link">Already registered? Login</a>
    </div>
  </div>
</div>
{% endblock %}
